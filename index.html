<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>FM 31 — Checklane POG Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&display=swap');
  
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e8eaf0;
    --text2: #8b90a5;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --uscan: #06b6d4;
    --uscan-bg: rgba(6,182,212,0.08);
    --liberty: #f59e0b;
    --liberty-bg: rgba(245,158,11,0.08);
    --queuing: #a78bfa;
    --queuing-bg: rgba(167,139,250,0.08);
    --left-color: #34d399;
    --right-color: #f472b6;
    --entrance-color: #fbbf24;
    --danger: #ef4444;
    --radius: 12px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(180deg, var(--bg) 0%, rgba(15,17,23,0.95) 100%);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
  }
  .header h1 {
    font-size: 18px; font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header h1 span { color: var(--accent2); }
  .header-sub {
    font-size: 12px; color: var(--text2);
    margin-top: 2px; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .back-btn {
    display: none; align-items: center; gap: 6px;
    background: none; border: none; color: var(--accent2);
    font: 500 14px/1 'DM Sans', sans-serif;
    cursor: pointer; padding: 4px 0; margin-bottom: 8px;
  }
  .back-btn svg { width:18px; height:18px; }
  .back-btn.visible { display: flex; }

  /* ── Tab Bar ── */
  .tabs {
    display: flex; gap: 4px;
    padding: 12px 20px 0;
  }
  .tab {
    flex: 1; padding: 10px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: var(--radius) var(--radius) 0 0;
    font: 500 13px/1 'DM Sans', sans-serif;
    color: var(--text2);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--accent);
    border-bottom: 2px solid var(--accent);
  }
  .tab .tab-icon { font-size: 16px; display: block; margin-bottom: 4px; }

  /* ── Lane List ── */
  .lane-list {
    padding: 0 20px 100px;
  }
  .lane-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0 0 var(--radius) var(--radius);
    overflow: hidden;
  }
  .lane-card {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .lane-card:last-child { border-bottom: none; }
  .lane-card:active { background: var(--surface2); }
  .lane-num {
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    font-weight: 700; font-size: 16px;
  }
  .lane-num.uscan { background: var(--uscan-bg); color: var(--uscan); }
  .lane-num.liberty { background: var(--liberty-bg); color: var(--liberty); }
  .lane-info { flex: 1; min-width: 0; }
  .lane-title { font-weight: 600; font-size: 15px; }
  .lane-meta {
    font-size: 12px; color: var(--text2);
    margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lane-badges {
    display: flex; gap: 4px;
  }
  .badge {
    padding: 3px 8px;
    border-radius: 6px;
    font: 600 11px/1.2 'DM Sans', sans-serif;
    letter-spacing: 0.03em;
  }
  .badge-L { background: rgba(52,211,153,0.15); color: var(--left-color); }
  .badge-R { background: rgba(244,114,182,0.15); color: var(--right-color); }
  .badge-E { background: rgba(251,191,36,0.15); color: var(--entrance-color); }

  /* ── Detail View ── */
  .detail-view {
    display: none;
    padding: 0 20px 100px;
  }
  .detail-view.visible { display: block; }

  .diagram-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .diagram-label {
    font-size: 11px; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 12px;
  }
  .diagram-title {
    font-size: 20px; font-weight: 700;
    margin-bottom: 4px;
  }
  .diagram-type {
    font-size: 13px; color: var(--text2);
    margin-bottom: 20px;
  }

  /* ── SVG Diagrams ── */
  .lane-svg {
    width: 100%;
    max-width: 340px;
    margin: 0 auto;
    display: block;
  }
  .lane-svg .zone {
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .lane-svg .zone:hover { opacity: 0.85; }

  /* ── POG Cards under diagram ── */
  .pog-cards {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 16px;
  }
  .pog-card {
    display: flex; gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
  }
  .pog-card:active { transform: scale(0.98); }
  .pog-card.orn-L { border-left: 3px solid var(--left-color); }
  .pog-card.orn-R { border-left: 3px solid var(--right-color); }
  .pog-card.orn-E { border-left: 3px solid var(--entrance-color); }
  .pog-card-thumb {
    width: 60px; height: 80px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--surface);
    flex-shrink: 0;
  }
  .pog-card-info { flex: 1; min-width: 0; }
  .pog-card-orn {
    font: 600 11px/1 'DM Sans', sans-serif;
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 6px;
  }
  .pog-card-orn.L { background: rgba(52,211,153,0.15); color: var(--left-color); }
  .pog-card-orn.R { background: rgba(244,114,182,0.15); color: var(--right-color); }
  .pog-card-orn.E { background: rgba(251,191,36,0.15); color: var(--entrance-color); }
  .pog-card-desc {
    font-size: 13px; font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .pog-card-dbkey {
    font-size: 11px; color: var(--text2);
    margin-top: 4px;
    font-family: monospace;
  }
  .pog-card-missing {
    opacity: 0.5;
    cursor: default;
  }
  .pog-card-missing::after {
    content: 'PDF not in package';
    display: block;
    font-size: 11px;
    color: var(--danger);
    margin-top: 4px;
  }

  /* ── PDF Viewer Modal ── */
  .viewer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    flex-direction: column;
  }
  .viewer-overlay.visible {
    display: flex;
  }
  .viewer-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .viewer-close {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
  }
  .viewer-title {
    flex: 1; min-width: 0;
    font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .viewer-pages {
    font-size: 12px; color: var(--text2);
    flex-shrink: 0;
  }
  .viewer-body {
    flex: 1;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px;
    gap: 2px;
    background: #0a0b0f;
  }
  .viewer-body canvas {
    display: block;
    width: 100%;
    max-width: 100%;
    height: auto;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .viewer-zoom-wrap {
    transform-origin: top center;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: transform 0.2s ease;
  }
  .viewer-page-slot {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    position: relative;
    min-height: 200px;
  }
  .viewer-page-slot.rendered {
    background: none;
    border: none;
    min-height: auto;
  }
  .viewer-spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .viewer-controls {
    display: flex; gap: 4px; flex-shrink: 0;
  }
  .viewer-ctrl-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 16px; font-weight: 600;
    flex-shrink: 0;
  }
  .viewer-ctrl-btn:active { background: var(--border); }
  .viewer-page-indicator {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26,29,39,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px; font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    z-index: 210;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .viewer-fallback {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
  }
  .viewer-fallback a {
    display: inline-block;
    margin-top: 16px;
    padding: 12px 24px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
  }

  /* ── Customer Arrow ── */
  .customer-arrow {
    text-align: center;
    padding: 8px 0;
    color: var(--text2);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .customer-arrow svg {
    display: block; margin: 4px auto 0;
    width: 24px; height: 24px;
  }

  /* ── Hidden utility ── */
  .hidden { display: none !important; }
</style>
</head>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="showList()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    All Lanes
  </button>
  <h1><span>FM 31</span> Checklane POG Viewer</h1>
  <div class="header-sub">C201 Blitz &middot; Division 701</div>
</div>

<div id="listView">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('uscan')" id="tabUscan">
      <span class="tab-icon">&#x1F6D2;</span>
      Self-Checkout 1–12
    </div>
    <div class="tab" onclick="switchTab('liberty')" id="tabLiberty">
      <span class="tab-icon">&#x1F6D2;</span>
      Liberty 13–22
    </div>
  </div>
  <div class="lane-list">
    <div class="lane-group" id="laneGroup"></div>
  </div>
</div>

<div class="detail-view" id="detailView"></div>

<div class="viewer-overlay" id="viewerOverlay">
  <div class="viewer-header">
    <button class="viewer-close" onclick="closeViewer()">&times;</button>
    <div class="viewer-title" id="viewerTitle"></div>
    <div class="viewer-pages" id="viewerPages"></div>
    <div class="viewer-controls">
      <button class="viewer-ctrl-btn" onclick="viewerZoom(-1)" title="Zoom out">&minus;</button>
      <button class="viewer-ctrl-btn" onclick="viewerZoom(0)" title="Fit width" style="font-size:12px;">FIT</button>
      <button class="viewer-ctrl-btn" onclick="viewerZoom(1)" title="Zoom in">+</button>
    </div>
  </div>
  <div class="viewer-body" id="viewerBody"></div>
  <div class="viewer-page-indicator" id="viewerPageIndicator" style="display:none;"></div>
</div>

function switchTab(tab) {

function renderLaneList() {
  const group = document.getElementById('laneGroup');
  let html = '';
  for (const [name, lane] of Object.entries(LANES)) {
    if (currentTab === 'uscan' && lane.type !== 'uscan') continue;
    if (currentTab === 'liberty' && lane.type !== 'liberty') continue;
    const orns = lane.positions.map(p => p.orn);
    const uniqueOrns = [...new Set(orns)];
    const badges = uniqueOrns.map(o => {
      const label = o === 'L' ? 'LEFT' : o === 'R' ? 'RIGHT' : 'ENTRY';
      return `<span class="badge badge-${o}">${label}</span>`;
    }).join('');
    const metaText = lane.positions.map(p => p.desc.split('—')[0].trim()).filter((v,i,a) => a.indexOf(v) === i).join(' + ');
    html += `<div class="lane-card" onclick="showDetail('${name}')">
      <div class="lane-num ${lane.type}">${lane.num}</div>
      <div class="lane-info">
        <div class="lane-title">${name}</div>
        <div class="lane-meta">${metaText}</div>
      </div>
      <div class="lane-badges">${badges}</div>
    </div>`;
  }
  group.innerHTML = html;
}

      const yOff = i * 38;
      const clickFn = ePos[i].has_pdf ? `onclick="openViewer('${escAttr(ePos[i].pdf)}','${escAttr(ePos[i].desc)}','${escAttr(ePos[i].dbkey)}')"` : '';

  // Right shelf
  if (hasR) {

/* ── PDF.js Viewer State ── */
let _pdfDoc = null;
let _pdfPages = {};       // pageNum -> canvas (cache)
let _pdfRendering = {};   // pageNum -> true if in-progress
let _pdfZoom = 1;
let _pdfTotalPages = 0;
let _pdfObserver = null;
let _pdfPath = '';
let _pdfAbort = false;
let _lastTap = 0;

const PDFJS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168';
let _pdfjsLib = null;

async function _getPdfjs() {
  if (_pdfjsLib) return _pdfjsLib;
  _pdfjsLib = await import(PDFJS_CDN + '/pdf.min.mjs');
  _pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_CDN + '/pdf.worker.min.mjs';
  return _pdfjsLib;
}

async function openViewer(pdf, desc, dbkey) {
  const overlay = document.getElementById('viewerOverlay');
  const body = document.getElementById('viewerBody');
  const indicator = document.getElementById('viewerPageIndicator');
  document.getElementById('viewerTitle').textContent = desc;
  const pages = PAGE_COUNTS[dbkey] || '?';
  document.getElementById('viewerPages').textContent = pages + ' pages';

  _pdfPath = 'pdfs/' + pdf;
  _pdfDoc = null;
  _pdfPages = {};
  _pdfRendering = {};
  _pdfZoom = 1;
  _pdfAbort = false;

  // Show overlay immediately with loading state
  body.innerHTML = '<div class="viewer-page-slot"><div class="viewer-spinner"></div></div>';
  indicator.style.display = 'none';
  overlay.classList.add('visible');
  document.body.style.overflow = 'hidden';

  try {
    const pdfjsLib = await _getPdfjs();
    if (_pdfAbort) return;
    const loadingTask = pdfjsLib.getDocument(_pdfPath);
    const pdfDoc = await Promise.race([
      loadingTask.promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 15000))
    ]);
    if (_pdfAbort) return;

    _pdfDoc = pdfDoc;
    _pdfTotalPages = pdfDoc.numPages;

    // Build page slots
    const zoomWrap = document.createElement('div');
    zoomWrap.className = 'viewer-zoom-wrap';
    zoomWrap.id = 'viewerZoomWrap';

    for (let i = 1; i <= _pdfTotalPages; i++) {
      const slot = document.createElement('div');
      slot.className = 'viewer-page-slot';
      slot.dataset.page = i;
      slot.id = 'pdfPage' + i;
      // Estimate aspect ratio for placeholder height
      slot.innerHTML = '<div class="viewer-spinner"></div>';
      zoomWrap.appendChild(slot);
    }

    body.innerHTML = '';
    body.appendChild(zoomWrap);

    // Set up Intersection Observer for lazy rendering
    _pdfObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const pageNum = parseInt(entry.target.dataset.page);
        if (entry.isIntersecting) {
          _renderPage(pageNum);
          // Buffer: render adjacent pages
          if (pageNum > 1) _renderPage(pageNum - 1);
          if (pageNum < _pdfTotalPages) _renderPage(pageNum + 1);
        }
      });
    }, { root: body, rootMargin: '200px 0px' });

    zoomWrap.querySelectorAll('.viewer-page-slot').forEach(slot => {
      _pdfObserver.observe(slot);
    });

    // Force-render page 1 immediately (don't rely solely on IntersectionObserver)
    _renderPage(1);
    if (_pdfTotalPages > 1) _renderPage(2);

    // Page indicator via scroll
    indicator.style.display = 'block';
    indicator.textContent = 'Page 1 of ' + _pdfTotalPages;

    const pageObserver = new IntersectionObserver((entries) => {
      let topPage = 1;
      entries.forEach(e => {
        if (e.isIntersecting) {
          const p = parseInt(e.target.dataset.page);
          if (p > topPage) topPage = p;
        }
      });
      // Find the topmost visible page
      const slots = zoomWrap.querySelectorAll('.viewer-page-slot');
      for (let i = 0; i < slots.length; i++) {
        const rect = slots[i].getBoundingClientRect();
        if (rect.bottom > body.getBoundingClientRect().top + 10) {
          indicator.textContent = 'Page ' + (i + 1) + ' of ' + _pdfTotalPages;
          break;
        }
      }
    }, { root: body, threshold: 0.1 });

    zoomWrap.querySelectorAll('.viewer-page-slot').forEach(slot => {
      pageObserver.observe(slot);
    });

    // Also update on scroll for more accuracy
    body.addEventListener('scroll', _updatePageIndicator, { passive: true });

    // Double-tap zoom on mobile
    body.addEventListener('touchend', _handleDoubleTap, { passive: true });

  } catch (err) {
    if (_pdfAbort) return;
    const isTimeout = err && err.message === 'timeout';
    body.innerHTML = `
      <div class="viewer-fallback">
        <p>${isTimeout ? 'PDF took too long to load.' : 'PDF could not be loaded.'}</p>
        <a href="${_pdfPath}" target="_blank" rel="noopener">Open PDF in New Tab</a>
        <br><button onclick="openViewer('${escAttr(pdf)}','${escAttr(desc)}','${escAttr(dbkey)}')" style="margin-top:12px;padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;">Retry</button>
      </div>
    `;
  }
}

function _updatePageIndicator() {
  const body = document.getElementById('viewerBody');
  const indicator = document.getElementById('viewerPageIndicator');
  const wrap = document.getElementById('viewerZoomWrap');
  if (!wrap || !indicator) return;
  const slots = wrap.querySelectorAll('.viewer-page-slot');
  const bodyTop = body.getBoundingClientRect().top;
  for (let i = 0; i < slots.length; i++) {
    const rect = slots[i].getBoundingClientRect();
    if (rect.bottom > bodyTop + 10) {
      indicator.textContent = 'Page ' + (i + 1) + ' of ' + _pdfTotalPages;
      break;
    }
  }
}

function _handleDoubleTap(e) {
  const now = Date.now();
  if (now - _lastTap < 300) {
    e.preventDefault();
    if (_pdfZoom > 1) {
      viewerZoom(0); // reset
    } else {
      viewerZoom(1); // zoom in
      viewerZoom(1); // zoom in more
    }
  }
  _lastTap = now;
}

async function _renderPage(pageNum) {
  if (_pdfPages[pageNum] || _pdfRendering[pageNum] || !_pdfDoc || _pdfAbort) return;
  _pdfRendering[pageNum] = true;

  try {
    const page = await _pdfDoc.getPage(pageNum);
    if (_pdfAbort) return;

    const slot = document.getElementById('pdfPage' + pageNum);
    if (!slot) return;

    // Render at a resolution that fills the viewer width
    const body = document.getElementById('viewerBody');
    const containerWidth = body.clientWidth - 16; // account for padding
    const viewport = page.getViewport({ scale: 1 });
    const scale = (containerWidth / viewport.width) * (window.devicePixelRatio || 1);
    const scaledViewport = page.getViewport({ scale });

    const canvas = document.createElement('canvas');
    canvas.width = scaledViewport.width;
    canvas.height = scaledViewport.height;
    canvas.style.width = containerWidth + 'px';
    canvas.style.height = (containerWidth * viewport.height / viewport.width) + 'px';

    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;
    if (_pdfAbort) return;

    slot.innerHTML = '';
    slot.appendChild(canvas);
    slot.classList.add('rendered');
    _pdfPages[pageNum] = canvas;
  } catch (err) {
    const slot = document.getElementById('pdfPage' + pageNum);
    if (slot && !slot.classList.contains('rendered')) {
      slot.innerHTML = '<div style="color:#f87171;font-size:12px;padding:16px;text-align:center;">Page failed to load</div>';
    }
  } finally {
    _pdfRendering[pageNum] = false;
  }
}

function viewerZoom(dir) {
  const wrap = document.getElementById('viewerZoomWrap');
  if (!wrap) return;
  if (dir === 0) {
    _pdfZoom = 1;
  } else if (dir > 0) {
    _pdfZoom = Math.min(_pdfZoom + 0.25, 3);
  } else {
    _pdfZoom = Math.max(_pdfZoom - 0.25, 0.5);
  }
  wrap.style.transform = 'scale(' + _pdfZoom + ')';
  wrap.style.width = (100 / _pdfZoom) + '%';
}

function closeViewer() {
  _pdfAbort = true;
  const overlay = document.getElementById('viewerOverlay');
  overlay.classList.remove('visible');
  const indicator = document.getElementById('viewerPageIndicator');
  if (indicator) indicator.style.display = 'none';
  const body = document.getElementById('viewerBody');
  body.removeEventListener('scroll', _updatePageIndicator);
  body.removeEventListener('touchend', _handleDoubleTap);
  if (_pdfObserver) { _pdfObserver.disconnect(); _pdfObserver = null; }
  body.innerHTML = '';
  _pdfDoc = null;
  _pdfPages = {};
  _pdfRendering = {};
  _pdfZoom = 1;
  document.body.style.overflow = '';
}

// Init
renderLaneList();
</script>
</body>
</html>
